<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор стоимости — Дипломная мастерская</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root {
  --bg: #F5F0E8;
  --paper: #FFFFFF;
  --paper-soft: #FAF6EC;
  --red: #C8102E;
  --red-dark: #9F0C24;
  --red-light: #E6213D;
  --red-tint: rgba(200, 16, 46, 0.07);
  --ink: #1A1410;
  --ink-soft: #4A4540;
  --ink-mute: #908A82;
  --line: #D8CFB8;
  --line-soft: #E6DDC8;
  --line-faint: rgba(216, 207, 184, 0.45);
  --zone-good: #5C9170;
  --zone-warn: #D4A857;
  --zone-bad: #C97D3F;
  --zone-crit: #C8102E;
  --shadow-sm: 0 2px 6px rgba(26, 20, 16, 0.06);
  --shadow-md: 0 8px 24px rgba(26, 20, 16, 0.07);
  --shadow-lg: 0 -10px 36px rgba(26, 20, 16, 0.10);
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --thumb-w: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  scroll-behavior: auto;
  scrollbar-gutter: stable;
}
body {
  font-family: 'Manrope', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  padding-bottom: 110px;
  font-variant-numeric: lining-nums;
  font-feature-settings: 'lnum';
}
@media (max-width: 720px) { body { padding-bottom: 130px; } }

.app {
  max-width: 980px;
  margin: 0 auto;
  padding: 18px 32px 64px;
}
@media (max-width: 720px) { .app { padding: 14px 16px 48px; } }

/* TOPBAR */
.topbar {
  text-align: center;
  padding: 24px 0 30px;
  margin-bottom: 38px;
  border-bottom: 1px solid var(--line-faint);
}
.topbar-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 54px;
  font-weight: 600;
  color: var(--red);
  letter-spacing: -0.025em;
  line-height: 1;
  margin-bottom: 12px;
}
.topbar-brand {
  font-size: 10px;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: var(--ink-mute);
  font-weight: 500;
}
@media (max-width: 720px) {
  .topbar { padding: 18px 0 22px; margin-bottom: 26px; }
  .topbar-main { font-size: 38px; margin-bottom: 8px; }
}
@media (max-width: 420px) { .topbar-main { font-size: 32px; } }

/* BLOCK */
.block { margin-bottom: 36px; }
.block-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 22px;
  letter-spacing: -0.015em;
  text-align: center;
}
.block-title.left { text-align: left; }
@media (max-width: 720px) {
  .block-title { font-size: 24px; margin-bottom: 16px; }
  .block { margin-bottom: 28px; }
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  width: 100%;
}
/* без сайдбара — широкая полоса, помещаются 6 в ряд */
@media (min-width: 880px) and (max-width: 1179px) {
  .cards { grid-template-columns: repeat(6, minmax(0, 1fr)); }
}
/* при сайдбаре: 3 колонки — иначе текст карточек не помещается */
@media (max-width: 540px) {
  .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
}

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 18px 16px 20px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s var(--ease), box-shadow 0.25s ease, color 0.25s ease;
  text-align: left;
  font: inherit;
  color: inherit;
  min-height: 116px;
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--red-light);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.card.selected {
  background: var(--red);
  border-color: var(--red);
  color: var(--paper);
}
.card.selected:hover { background: var(--red-dark); border-color: var(--red-dark); }
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: auto;
  letter-spacing: -0.01em;
  line-height: 1.15;
  padding-right: 18px;
}
.card-price-label {
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 16px;
  margin-bottom: 4px;
}
.card.selected .card-price-label { color: rgba(255, 255, 255, 0.7); }
.card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.card.selected .card-price { color: var(--paper); }

.card-deselect {
  position: absolute;
  top: 9px;
  right: 11px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 400;
  line-height: 1;
  transition: color 0.2s ease, transform 0.2s ease;
}
.card.selected:hover .card-deselect { color: var(--paper); transform: scale(1.15); }

.card-other {
  grid-column: 1 / -1;
  flex-direction: row;
  gap: 8px;
  border-style: dashed;
  border-color: var(--ink-mute);
  background: transparent;
  justify-content: center;
  align-items: center;
  min-height: 0;
  padding-top: 14px;
  padding-bottom: 14px;
}
.card-other .card-title {
  color: var(--ink);
  margin: 0;
  padding-right: 0;
  text-align: center;
}
.card-other:hover { border-color: var(--red); background: var(--paper-soft); }
.card-other.open { background: var(--red-tint); border-color: var(--red); border-style: solid; }
.card-other-plus {
  font-family: 'Manrope', sans-serif;
  font-size: 30px;
  color: var(--red);
  font-weight: 300;
  line-height: 1;
  margin-bottom: 12px;
  transition: transform 0.5s var(--ease);
}
.card-other.open .card-other-plus { transform: rotate(45deg); }

/* EXPAND */
.expand {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.7s var(--ease), opacity 0.55s ease, margin-top 0.6s var(--ease);
  opacity: 0;
  margin-top: 0;
}
.expand.open { grid-template-rows: 1fr; opacity: 1; margin-top: 18px; }
.expand-inner { overflow: hidden; min-height: 0; }

/* PANEL */
.panel {
  padding: 28px 32px;
  background: var(--paper);
  border: 1px solid var(--line);
  position: relative;
  width: 100%;
}
@media (max-width: 720px) { .panel { padding: 22px 20px; } }

/* FIELDS */
.field { margin-bottom: 26px; }
.field:last-child { margin-bottom: 0; }
.field-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  gap: 16px;
  flex-wrap: wrap;
}
.field-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.field-value {
  font-family: 'Cormorant Garamond', serif;
  color: var(--red);
  font-size: 22px;
  font-weight: 700;
  font-feature-settings: 'lnum', 'tnum';
  line-height: 1;
}
.field-value.muted { color: var(--ink-mute); }
.field-hint {
  font-size: 13px;
  color: var(--ink-mute);
  margin-top: 12px;
  line-height: 1.5;
}
.field-hint .accent { color: var(--ink); font-weight: 600; }

/* NUM INPUT — editable values, look like input boxes */
.num-unit {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--red);
  line-height: 1;
}
.num-unit.muted { color: var(--ink-mute); }
.num-unit .unit { font-size: inherit; font-weight: inherit; color: inherit; line-height: 1; }
.num-input {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--red);
  background: var(--paper-soft);
  border: 1px dashed var(--line);
  border-radius: 4px;
  text-align: center;
  width: 70px;
  font-feature-settings: 'lnum', 'tnum';
  font-variant-numeric: lining-nums tabular-nums;
  outline: none;
  padding: 5px 8px;
  line-height: 1;
  -moz-appearance: textfield;
  appearance: textfield;
  transition: all 0.2s ease;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num-input:hover:not(:disabled) { border-color: var(--red-light); }
.num-input:focus { border-color: var(--red); border-style: solid; background: var(--paper); }
.num-input.muted, .num-input:disabled {
  color: var(--ink-mute);
  cursor: not-allowed;
  background: transparent;
  border-color: var(--line-faint);
}

/* DEADLINE — editable num, boxed (slightly bigger than num-input) */
.deadline-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--red);
  background: var(--paper-soft);
  border: 1px dashed var(--line);
  border-radius: 5px;
  text-align: center;
  width: 88px;
  letter-spacing: -0.01em;
  line-height: 1;
  padding: 6px 10px;
  outline: none;
  font-feature-settings: 'lnum', 'tnum';
  font-variant-numeric: lining-nums tabular-nums;
  -moz-appearance: textfield;
  appearance: textfield;
  transition: all 0.2s ease;
}
.deadline-num::-webkit-outer-spin-button,
.deadline-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.deadline-num:hover { border-color: var(--red-light); }
.deadline-num:focus { border-color: var(--red); border-style: solid; background: var(--paper); }
.deadline-unit {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0;
}
@media (max-width: 540px) {
  .deadline-num { font-size: 24px; width: 78px; padding: 5px 8px; }
  .deadline-unit { font-size: 17px; }
}

/* SLIDER */
.range-wrap {
  position: relative;
  height: 30px;
  display: flex;
  align-items: center;
}
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  background: transparent;
  outline: none;
  cursor: pointer;
  height: 30px;
  margin: 0;
  padding: 0;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 3px;
  background: var(--track-bg, var(--line));
  transition: opacity 0.25s ease;
}
input[type=range]::-moz-range-track {
  height: 6px;
  border-radius: 3px;
  background: var(--track-bg, var(--line));
  border: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  background: var(--paper);
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  margin-top: -7px;
  box-shadow: 0 2px 6px rgba(26, 20, 16, 0.20);
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.18); background: var(--ink); }
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.1); }
input[type=range]::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: var(--paper);
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(26, 20, 16, 0.20);
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}
input[type=range]::-moz-range-thumb:hover { transform: scale(1.18); background: var(--ink); }
input[type=range]:disabled { cursor: not-allowed; opacity: 0.45; }
input[type=range]:disabled::-webkit-slider-runnable-track { background: var(--line); }
input[type=range]:disabled::-webkit-slider-thumb { background: var(--ink-mute); border-color: var(--ink-mute); cursor: not-allowed; }
input[type=range]:disabled::-moz-range-track { background: var(--line); }
input[type=range]:disabled::-moz-range-thumb { background: var(--ink-mute); border-color: var(--ink-mute); }

/* CHECKBOX */
.checkbox {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.4;
  position: relative;
}
.checkbox input,
.stat-item input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px;
  height: 1px;
  margin: 0;
  padding: 0;
}
.checkbox-mark {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--red);
  background: var(--paper);
  position: relative;
  flex-shrink: 0;
  transition: all 0.2s ease;
  border-radius: 3px;
}
.checkbox:hover .checkbox-mark,
.stat-item:hover .checkbox-mark { background: var(--paper-soft); }
.checkbox input:checked ~ .checkbox-mark,
.stat-item input:checked ~ .checkbox-mark { background: var(--red); }
.checkbox input:checked ~ .checkbox-mark::after,
.stat-item input:checked ~ .checkbox-mark::after {
  content: '';
  position: absolute;
  left: 6px;
  top: 2px;
  width: 5px;
  height: 10px;
  border: solid var(--paper);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.checkbox input:focus-visible ~ .checkbox-mark,
.stat-item input:focus-visible ~ .checkbox-mark {
  outline: 2px solid var(--red-light);
  outline-offset: 2px;
}

/* OTHER LIST */
.other-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.005em;
}
.add-list { display: flex; flex-direction: column; }
.add-item { padding: 16px 0; border-bottom: 1px solid var(--line-faint); }
.add-item:first-child { padding-top: 8px; }
.add-item-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.add-item-name { flex: 1; font-size: 16px; }
.add-item-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--red);
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.add-item-controls {
  margin-top: 14px;
  padding-left: 32px;
}
@media (max-width: 720px) { .add-item-controls { padding-left: 0; } }

/* SPOILER ROW (used inside add-list for stats / articles) */
.spoiler-row {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 16px;
  color: var(--ink);
  text-align: left;
  padding: 0;
  flex: 1;
  user-select: none;
  line-height: 1.4;
  transition: color 0.2s ease;
}
.spoiler-row:hover { color: var(--red); }
.spoiler-mark {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--red);
  background: var(--paper);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Manrope', sans-serif;
  font-size: 16px;
  font-weight: 300;
  color: var(--red);
  line-height: 1;
  flex-shrink: 0;
  transition: all 0.5s var(--ease);
}
.spoiler-row.open .spoiler-mark {
  background: var(--red);
  color: var(--paper);
  transform: rotate(45deg);
}

.sub-list {
  padding: 8px 0 4px 32px;
  display: flex;
  flex-direction: column;
}
@media (max-width: 720px) { .sub-list { padding-left: 0; } }
.sub-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--line-faint);
  font-size: 15px;
  color: var(--ink);
  position: relative;
  line-height: 1.45;
  transition: padding-left 0.2s ease;
}
.sub-item:hover { padding-left: 4px; }
.sub-item:last-child { border-bottom: none; }
.sub-item input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px;
  height: 1px;
}
.sub-item input:checked ~ .checkbox-mark { background: var(--red); }
.sub-item input:checked ~ .checkbox-mark::after {
  content: '';
  position: absolute;
  left: 6px;
  top: 2px;
  width: 5px;
  height: 10px;
  border: solid var(--paper);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.sub-item-name { flex: 1; }
.sub-item-price {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  color: var(--red);
  font-size: 17px;
  white-space: nowrap;
  letter-spacing: -0.005em;
  font-feature-settings: 'lnum', 'tnum';
  font-variant-numeric: lining-nums tabular-nums;
}

/* DEADLINE */
.deadline-head {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "label label"
    "value badge";
  gap: 6px 16px;
  margin-bottom: 22px;
  align-items: center;
}
.deadline-main { display: contents; }
@media (max-width: 540px) {
  .deadline-head { gap: 4px 12px; }
  .urgency-badge { padding: 9px 12px; min-width: 84px; }
  .urgency-badge .urgency-pct { font-size: 19px; }
  .urgency-badge .urgency-text { font-size: 8px; letter-spacing: 0.14em; }
}
.deadline-main-label {
  grid-area: label;
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--ink-mute);
  font-weight: 600;
  white-space: nowrap;
}
.deadline-main-value {
  grid-area: value;
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.urgency-badge {
  grid-area: badge;
  align-self: center;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 11px 16px;
  background: var(--paper-soft);
  border: 1.5px solid var(--line);
  min-width: 100px;
  transition: all 0.6s var(--ease);
}
.urgency-badge .urgency-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink-soft);
  font-feature-settings: 'lnum', 'tnum';
  transition: color 0.6s var(--ease);
}
.urgency-badge .urgency-text {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  margin-top: 4px;
  color: var(--ink-mute);
  transition: color 0.6s var(--ease);
}
.urgency-badge.level-0 { border-color: var(--zone-good); background: rgba(92, 145, 112, 0.08); }
.urgency-badge.level-0 .urgency-pct,
.urgency-badge.level-0 .urgency-text { color: var(--zone-good); }
.urgency-badge.level-1 { border-color: var(--zone-warn); background: rgba(212, 168, 87, 0.12); }
.urgency-badge.level-1 .urgency-pct,
.urgency-badge.level-1 .urgency-text { color: #A6802F; }
.urgency-badge.level-2 { border-color: var(--zone-bad); background: rgba(201, 125, 63, 0.12); }
.urgency-badge.level-2 .urgency-pct,
.urgency-badge.level-2 .urgency-text { color: var(--zone-bad); }
.urgency-badge.level-3 { border-color: var(--zone-crit); background: var(--red-tint); }
.urgency-badge.level-3 .urgency-pct,
.urgency-badge.level-3 .urgency-text { color: var(--red); }

.deadline-comfort {
  margin-top: 16px;
  font-size: 14px;
  color: var(--ink-soft);
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.deadline-comfort-label { letter-spacing: 0.04em; }
.deadline-comfort-value {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  color: var(--ink);
  font-size: 24px;
  line-height: 1;
  letter-spacing: -0.01em;
}

@media (max-width: 540px) {
  .deadline-comfort-value { font-size: 20px; }
}

.zone-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 18px;
  margin-top: 14px;

}
.zone-legend span { display: inline-flex; align-items: center; gap: 6px; }

/* MONTH */
.month-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 700;
  text-align: left;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: var(--ink);
}

  font-size: 13px;
  margin-bottom: 18px;
  letter-spacing: 0.01em;
  font-weight: 500;
  color: var(--ink);
}
.month-discount-line.has {
  color: var(--zone-good);
  font-weight: 700;
  letter-spacing: 0.04em;
}

/* Month marks — children positioned via calc() to match thumb */
.month-marks {
  position: relative;
  height: 38px;
  margin-top: 12px;
}
.month-marks .tick {
  position: absolute;
  top: 0;
  width: 1px;
  height: 4px;
  background: var(--ink-mute);
  opacity: 0.4;
  transform: translateX(-50%);
  transition: all 0.2s ease;
}
.month-marks .tick.current {
  background: var(--red);
  opacity: 1;
  height: 6px;
  width: 2px;
}
.month-marks .month-label {
  position: absolute;
  top: 10px;
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 500;
  white-space: nowrap;
  letter-spacing: 0.02em;
  transition: color 0.2s ease;
}
.month-marks .month-label.current { color: var(--red); font-weight: 700; }
.month-marks .lbl-short { display: none; }
@media (max-width: 880px) {
  .month-marks .lbl-full { display: none; }
  .month-marks .lbl-short { display: inline; }
  .month-marks .month-label { font-size: 10px; }
}

/* PROMO */
.promo-input {
  width: 100%;
  padding: 14px 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  font-family: 'Manrope', sans-serif;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  outline: none;
  transition: all 0.2s ease;
  border-radius: 2px;
  font-weight: 500;
}
.promo-input:focus { border-color: var(--red); }
.promo-input::placeholder {
  color: var(--ink-mute);
  text-transform: none;
  letter-spacing: 0;
  font-style: italic;
  font-weight: 400;
}
.promo-status {
  margin-top: 10px;
  font-size: 13px;
  font-weight: 500;
}
.promo-status.success { color: var(--zone-good); font-weight: 700; }
.promo-status.fail { color: var(--ink-mute); }

/* NEXT BUTTON */
.next-wrap {
  text-align: center;
  max-height: 0;
  opacity: 0;
  margin-top: 0;
  overflow: hidden;
  transition: max-height 0.6s var(--ease), opacity 0.5s ease, margin-top 0.6s var(--ease);
  pointer-events: none;
}
.next-wrap.visible {
  max-height: 100px;
  opacity: 1;
  margin-top: 28px;
  pointer-events: auto;
}
.next-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 14px 36px;
  background: transparent;
  border: 1.5px solid var(--red);
  color: var(--red);
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  border-radius: 2px;
}
.next-btn .arrow {
  display: inline-block;
  transition: transform 0.3s ease;
  font-size: 16px;
  line-height: 1;
}
.next-btn:hover {
  background: var(--red);
  color: var(--paper);
  letter-spacing: 0.22em;
}
.next-btn:hover .arrow { transform: translateY(4px); }

/* BREAKDOWN */
.breakdown {
  background: var(--paper);
  border: 1px solid var(--line);

  width: 100%;
}
@media (max-width: 720px) { .breakdown { padding: 22px 20px; } }
.bd-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 10px 0;
  font-size: 14px;
  gap: 16px;
  border-bottom: 1px dotted var(--line);
}
.bd-row:last-child { border-bottom: none; }
.bd-row.item .label {
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-style: italic;
  font-weight: 500;
}
.bd-row .label { color: var(--ink-soft); flex: 1; }
.bd-row .value {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  color: var(--ink);
  font-feature-settings: 'lnum', 'tnum';
  font-size: 17px;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.bd-row .value.positive { color: var(--red); }

.bd-divider { height: 1px; background: var(--line); margin: 12px 0; }
.bd-row.summary {
  padding-top: 14px;
  border-top: 1px solid var(--line);

}
.bd-row.summary .label,
.bd-row.summary .value { color: var(--ink); font-weight: 700; font-size: 17px; }
.bd-row.final {
  padding-top: 18px;
  margin-top: 6px;
  border-top: 2px solid var(--red);
  border-bottom: none;
}
.bd-row.final .label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
}
.bd-row.final .value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: -0.02em;
}
.bd-installment {
  margin-top: 16px;
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;

}

/* STICKY */
.sticky {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--paper);
  border-top: 2px solid var(--red);
  box-shadow: var(--shadow-lg);
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.7s var(--ease);
}
.sticky.visible { transform: translateY(0); }
.sticky-inner {
  max-width: 980px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.sticky-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.sticky-label {
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--ink-mute);
  font-weight: 600;
}
.sticky-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: -0.02em;
  line-height: 1;
  font-feature-settings: 'lnum', 'tnum';
}
.sticky-price-anim { animation: priceShift 0.6s var(--ease); }
@keyframes priceShift {
  from { opacity: 0.45; transform: translateY(-3px); }
  to { opacity: 1; transform: translateY(0); }
}
.cta {
  padding: 16px 32px;
  background: var(--red);
  color: var(--paper);
  text-align: center;
  text-decoration: none;
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  display: inline-flex;
  align-items: center;
  gap: 12px;
  white-space: nowrap;
}
.cta::after { content: '→'; display: inline-block; transition: transform 0.3s ease; font-size: 18px; }
.cta:hover { background: var(--red-dark); letter-spacing: 0.2em; }
.cta:hover::after { transform: translateX(6px); }
@media (max-width: 720px) {
  .sticky-inner { padding: 12px 18px; gap: 12px; }
  .sticky-price { font-size: 28px; }
  .cta { padding: 14px 18px; font-size: 12px; letter-spacing: 0.12em; }
  .cta::after { font-size: 16px; }
}

/* LAYOUT — two-column on wide */
.sidebar { display: none; }

.layout-title { display: block; }

@media (min-width: 1180px) {
  .app { max-width: 1380px; padding-left: 40px; padding-right: 40px; }
  body { padding-bottom: 36px; }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    grid-template-rows: auto 1fr;
    column-gap: 88px;
    row-gap: 0;
    align-items: start;
  }
  .layout-title {
    grid-column: 1 / -1;
    grid-row: 1;
  }
  .form-col {
    min-width: 0;
    max-width: 100%;
    grid-column: 1;
    grid-row: 2;
  }
  .sidebar {
    display: block;
    position: sticky;
    top: 24px;
    grid-column: 2;
    grid-row: 2;
    align-self: start;
  }
  .sticky { display: none !important; }
}

.sidebar-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-top: 3px solid var(--red);
  padding: 26px 28px 28px;
}
.sidebar-label {
  font-size: 10px;

}
.sidebar-price {
  font-family: 'Cormorant Garamond', serif;

  font-weight: 700;

  margin-bottom: 6px;

}

  font-size: 11px;

}

}
.sidebar-section:last-of-type { margin-bottom: 18px; }
.sidebar-row {
  display: flex;

}

}

}

.sidebar-row .value.negative { color: var(--zone-good); }
.sidebar-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 14px 16px;
  background: var(--red);
  color: var(--paper);
  text-decoration: none;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;

}
.sidebar-cta::after { content: '→'; font-size: 16px; transition: transform 0.3s ease; }
.sidebar-cta:hover { background: var(--red-dark); letter-spacing: 0.22em; }
.sidebar-cta:hover::after { transform: translateX(4px); }
.sidebar-cta-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px 16px;
  border: 1.5px dashed var(--line);
  color: var(--ink-mute);
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-style: italic;
  text-align: center;
}
.sidebar-installment {
  margin-top: 14px;
  font-size: 11px;
  color: var(--ink-soft);
  font-style: italic;
  text-align: center;
  line-height: 1.4;
}

/* MODAL — форма заявки */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26, 20, 16, 0.55);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s var(--ease);
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-top: 3px solid var(--red);
  width: 100%;
  max-width: 480px;
  padding: 36px 36px 32px;
  position: relative;
  transform: translateY(20px) scale(0.97);
  opacity: 0;
  transition: transform 0.5s var(--ease), opacity 0.4s ease;
  max-height: calc(100vh - 48px);
  overflow-y: auto;
}
.modal-backdrop.open .modal-card { transform: translateY(0) scale(1); opacity: 1; }
@media (max-width: 540px) { .modal-card { padding: 28px 22px 24px; } }
.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  font-size: 26px;
  color: var(--ink-mute);
  cursor: pointer;
  padding: 6px 12px;

  font-weight: 300;

}

.modal-title {

  line-height: 1.1;

}
.modal-subtitle {
  font-size: 13px;
  color: var(--ink-mute);
  margin-bottom: 22px;

}
.modal-summary {

  border: 1px solid var(--line);
  padding: 14px 16px;
  margin-bottom: 22px;
  font-size: 13px;

  line-height: 1.5;
}

  letter-spacing: 0.32em;

}

}

}
.form-submit {
  width: 100%;
  margin-top: 18px;
  padding: 16px 24px;
  background: var(--red);
  color: var(--paper);
  border: none;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;

  transition: all 0.3s var(--ease);
  display: flex;
  align-items: center;

}
.form-submit::after {

}
